name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Static checks
        run: npm run check

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend lint
        run: npm run lint

      - name: Guard — no hardcoded localhost in frontend source
        run: |
          if grep -r --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
            "http://localhost" frontend/src; then
            echo "ERROR: hardcoded localhost URL found in frontend/src — use VITE_API_URL instead"
            exit 1
          fi

      - name: Guard — no unexpected localhost in backend source
        run: |
          FOUND=$(grep -r --include="*.js" "http://localhost" backend \
            | grep -v "backend/utils/cors.js" \
            | grep -v "backend/utils/googleOAuth.js" || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: unexpected hardcoded localhost URL in backend source:"
            echo "$FOUND"
            exit 1
          fi

      - name: Frontend build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.ci.example.com
